name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Wails GUI (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: ocgt-windows-amd64.exe
            path: build/bin/ocgt.exe
          - os: macos-latest
            platform: darwin/universal
            name: ocgt-macos-universal.app
            path: build/bin/ocgt.app
          - os: ubuntu-22.04
            platform: linux/amd64
            name: ocgt-linux-amd64
            path: build/bin/ocgt
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config libayatana-appindicator3-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails GUI Binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -clean -ldflags "-s -w -X github.com/ethan-blue/open-code-go-tools/internal/version.Version=${VERSION}"

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          tar -czvf ocgt-macos-universal.tar.gz ocgt.app

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" == "macOS" ]; then
            mv build/bin/ocgt-macos-universal.tar.gz dist/ocgt-macos-universal.tar.gz
          else
            mv "${{ matrix.path }}" "dist/${{ matrix.name }}"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform != 'darwin/universal' && matrix.name || 'ocgt-macos-universal.tar.gz' }}
          path: dist/*
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ocgt ${{ github.ref_name }} GUI
          body: |
            ocgt ${{ github.ref_name }} 版本说明

            更新日志 (Changelog):

            - **费用估算双重计费（严重）**：`EstimateCost` 对缓存读取的 tokens 既按全价计费又按缓存价计费，导致有缓存的请求费用虚高约 2-23 倍
            - **`extractUsageFromAnthropicStream` 缺字段**：只解析 `message_delta`，遗漏 `message_start` 中的 `input_tokens` / `cache` 字段
            - **重试导致请求次数虚高**：每次重试失败都写入历史记录，1 次请求最多被计 6 次，修复后仅终态记录
            - **`modelBreakdown` 缓存命中率误含写入**：命中率分子改为只使用 `CacheRead`
            - **流式 `message_delta` 缺 `input_tokens`**：OpenAI → Anthropic 合成消息补全 `input_tokens`
            - **流量界面选择"今日"时间窗口错误**：使用 `time.Now()` 导致近 24h，修复为当日 00:00 基准
            详细信息见 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/main/RELEASE_NOTES.md)
          files: |
            dist/*
          generate_release_notes: false
