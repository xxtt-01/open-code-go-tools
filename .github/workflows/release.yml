name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Wails GUI
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails GUI Binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform windows/amd64 -clean -ldflags "-s -w -X github.com/ethan-blue/open-code-go-tools/internal/version.Version=${VERSION}"

      - name: Prepare Windows Asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          $binary = Get-ChildItem -Path build/bin -File -Filter "ocgt*.exe" | Select-Object -First 1
          if (-not $binary) { throw "Built executable not found" }
          Copy-Item -LiteralPath $binary.FullName -Destination dist/ocgt-windows-amd64.exe -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocgt-windows-amd64.exe
          path: dist/ocgt-windows-amd64.exe
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ocgt ${{ github.ref_name }} GUI
          body: |
            ocgt ${{ github.ref_name }} focuses on Claude Code compatibility, thinking/reasoning streaming, startup latency, and a safer GUI configuration flow.

            Highlights:
            - Replaces the raw Thinking Token input with fixed thinking strength options.
            - Supports Claude Code thinking environment variables, including MAX_THINKING_TOKENS and CLAUDE_CODE_DISABLE_THINKING.
            - Converts real upstream reasoning/thinking fields into Anthropic thinking stream blocks when available.
            - Reduces initial GUI wait time and prevents duplicate app instances.
            - Fixes mojibake in user-facing text and release metadata.

            Download `ocgt-windows-amd64.exe` for Windows.
          files: |
            dist/*
          generate_release_notes: true
