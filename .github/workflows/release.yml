name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Wails GUI (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: ocgt-windows-amd64.exe
            path: build/bin/ocgt.exe
          - os: macos-latest
            platform: darwin/universal
            name: ocgt-macos-universal.app
            path: build/bin/ocgt.app
          - os: ubuntu-22.04
            platform: linux/amd64
            name: ocgt-linux-amd64
            path: build/bin/ocgt
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config libayatana-appindicator3-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails GUI Binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -clean -ldflags "-s -w -X github.com/ethan-blue/open-code-go-tools/internal/version.Version=${VERSION}"

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          tar -czvf ocgt-macos-universal.tar.gz ocgt.app

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" == "macOS" ]; then
            mv build/bin/ocgt-macos-universal.tar.gz dist/ocgt-macos-universal.tar.gz
          else
            mv "${{ matrix.path }}" "dist/${{ matrix.name }}"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform != 'darwin/universal' && matrix.name || 'ocgt-macos-universal.tar.gz' }}
          path: dist/*
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ocgt ${{ github.ref_name }} GUI
          body: |
            ocgt ${{ github.ref_name }} 版本说明

            更新日志 (Changelog):

            - **修复鉴权头回归（严重）**：v2.0.4 的 `applyAnthropicAuth` 会无条件删除上游请求的 `Authorization: Bearer` 头、仅保留 `X-Api-Key`，导致默认上游 `opencode.ai/zen/go`（依赖 Bearer 认证）返回 401，所有 `/v1/models`、`/v1/messages`、`/v1/messages/count_tokens`、`/v1/chat/completions` 请求均受影响
            - **新增配置驱动的鉴权方式**：`Profile` 增加 `auth_mode` 字段（`bearer`（默认）/ `x-api-key` / `both`），`applyAnthropicAuth` 按配置选择鉴权头策略，彻底解决一刀切问题。默认 `bearer` 保持对 OpenAI 兼容网关向后兼容，老配置零迁移
            - 参考了 fuergaosi233/claude-code-proxy、Calcium-Ion/new-api、LiteLLM 等业界项目的鉴权头处理方案
            详细信息见 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/main/RELEASE_NOTES.md)
          files: |
            dist/*
          generate_release_notes: false
